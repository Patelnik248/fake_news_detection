events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $request_time s "$request" $status';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream: Flask+Waitress API service ──────────────────
    upstream flask_api {
        server flask-api:5001;
    }

    server {
        listen 80;
        server_name _;

        # ── Route all traffic to Flask ────────────────────────
        location / {
            proxy_pass         http://flask_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
        }

        # ── Health check ──────────────────────────────────────
        location /health {
            proxy_pass http://flask_api/health;
        }

        # ── Prometheus metrics ────────────────────────────────
        location /metrics {
            proxy_pass http://flask_api/metrics;
        }
    }
}
