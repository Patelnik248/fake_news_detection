<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeNews Detector — AI Classifier</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
</head>

<body>

    <div class="grid-bg"></div>

    <main class="container">

        <header>
            <div class="logo">
                <div class="logo-mark">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <span class="logo-text">FakeNews<span class="accent">Detector</span></span>
            </div>
            <p class="tagline">Verify articles with AI · Know what's real</p>
        </header>

        <section class="card input-card">
            <div class="card-label">
                <span class="dot-indicator"></span>
                Article Input
            </div>

            <textarea
                id="news-text"
                placeholder="Paste a news article here to analyse it…"
                autofocus
                spellcheck="false"
            ></textarea>

            <div class="input-footer">
                <span class="char-count">
                    <span id="current-count">0</span> characters
                </span>
                <span class="min-hint">min. 10 characters</span>
            </div>

            <button id="predict-btn" class="primary-btn" disabled>
                <span class="btn-inner">
                    <span class="btn-text">Analyse Article</span>
                    <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </span>
                <span class="btn-loader">
                    <span class="loader-ring"></span>
                    Analysing…
                </span>
            </button>
        </section>

        <section id="result-container" class="card result-card hidden">
            <div class="result-top">
                <div>
                    <p class="result-eyebrow">Verdict</p>
                    <div id="result-badge" class="verdict-badge">FAKE</div>
                </div>
                <div class="conf-block">
                    <p class="result-eyebrow">Confidence</p>
                    <span id="confidence-value" class="conf-number">94.2%</span>
                </div>
            </div>

            <div class="bar-track">
                <div id="confidence-bar" class="bar-fill"></div>
            </div>

            <p id="result-message" class="result-message">
                This article shows strong indicators of being <strong id="result-type">Fake</strong> news.
            </p>

            <button id="reset-btn" class="ghost-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
                Start Over
            </button>
        </section>

    </main>

    <script src="/static/script.js"></script>
</body>
</html>
